<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TK's Rhythm Drop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <h1>Rhythm Drop</h1>
    <div id="game">
      <div class="lane" data-key="c"><div class="receptor"></div></div>
      <div class="lane" data-key="v"><div class="receptor"></div></div>
      <div class="lane" data-key="n"><div class="receptor"></div></div>
      <div class="lane" data-key="m"><div class="receptor"></div></div>
    </div>
    
    <div id="info">
      <input type="file" id="audioFile" accept="audio/*" />
      <button id="loadBtn">Load Audio & Generate Map</button>
      <button id="playBtn" disabled>Play</button>
      <div id="score">Score: 0</div>
      <div id="judgement"></div>
    </div>
    
    <div id="layout">CVNM layout</div>
  </div>

  <audio id="track" crossorigin="anonymous"></audio>
  <script src="script.js"></script>
</body>
</html>
